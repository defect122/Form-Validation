<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template</title>
</head>

<body>
  <header>
    <nav></nav>
  </header>
  <aside></aside>
  <div id="content">
    <div id="default">
      <form novalidate>
        <div>
          <label for="email">Email:
            <input type="email" name="email" id="email" minlength="8" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
              placeholder="example@something.domain" autocomplete="username" required>
            <span class="error"></span>
          </label>
        </div>
        <div>
          <label for="country">Country</label>
          <select class="form-select-country" id="country" name="country" required>
            <option value="" disabled>Please Select a Country</option>
            <option value="GB">United Kingdom</option>
            <option value="US" selected>United States</option>
          </select>
        </div>
        <div>
          <label for="postalCode">Postal Code
            <input type="text" pattern="[0-9]{5}" placeholder="12345" minlength="5" maxlength="5" name="postalCode"
              id="postalCode" title="ZIP Code" required>
            <span class="error"></span>
          </label>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" name="password" autocomplete="off" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
            minlength="8" maxlength="20" id="password" required>
          <span class="error"></span>
        </div>
        <div>
          <label for="passwordConfirm">Confirm Password
            <input type="password" name="passwordConfirm" autocomplete="off" id="passwordConfirm" required>
            <span class="error"></span>
          </label>
        </div>
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
        <span class="congrats"></span>
      </form>
    </div>
  </div>
</body>

</html>
